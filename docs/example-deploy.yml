name: Bootstrap – Terraform Apply

# NOTE: The very first apply must be run manually with human AWS credentials
# (chicken-and-egg: the OIDC role doesn't exist until after the first apply).
# All subsequent applies use this workflow.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    # No environment here — plan is read-only, no AWS write access needed for context
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Role created by this bootstrap repo on first manual apply.
          # Name pattern: github-<owner>-<repo>
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-${{ github.repository_owner }}-${{ github.event.repository.name }}
          aws-region: ${{ vars.AWS_REGION || 'ca-central-1' }}

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    # GitHub Environment enforces the OIDC trust policy condition:
    #   "token.actions.githubusercontent.com:sub": "repo:org/repo:environment:prod"
    # Configure required reviewers on the "prod" environment in GitHub repo settings
    # to get a human approval gate before apply.
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-${{ github.repository_owner }}-${{ github.event.repository.name }}
          aws-region: ${{ vars.AWS_REGION || 'ca-central-1' }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Apply
        run: terraform apply tfplan

